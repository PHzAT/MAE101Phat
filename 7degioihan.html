<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>7 Đề Trắc Nghiệm Giới Hạn</title>

<!-- MathJax -->
<script>
window.MathJax = {
  tex: { inlineMath: [['\\(','\\)']] }
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
body{font-family:Arial;background:#f4f6f9;padding:20px}
h1{text-align:center;color:#1e3a8a}

.tabs{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.tab{padding:10px 15px;background:#2563eb;color:white;border-radius:8px;cursor:pointer}
.tab.active{background:#1e40af}

.question{background:white;padding:15px;margin-bottom:15px;border-radius:10px}
.option{border:1px solid #ccc;padding:10px;margin-top:8px;border-radius:6px;cursor:pointer}

.correct{background:#bbf7d0}
.wrong{background:#fecaca}

.explanation{
  display:none;
  margin-top:10px;
  background:#eee;
  padding:10px;
  border-left:4px solid blue;
}

.score{font-size:18px;margin-bottom:15px}
</style>
</head>

<body>

<h1>HỆ THỐNG 7 ĐỀ THI GIỚI HẠN</h1>

<div class="tabs" id="tabs"></div>

<div class="score">
Điểm: <span id="score">0</span>
</div>

<div id="quiz"></div>

<script>

// ================= RANDOM =================
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

// ================= SINH CÂU HỎI =================
function generateQuestion(i){

  const type = i % 8;

  // 1. Giới hạn cơ bản
  if(type===0){
    let a = rand(1,5);
    return {
      q:`Tính \\(\\lim_{x \\to ${a}} (x + 2)\\)`,
      ops:[
        `${a+2}`,
        `${a}`,
        `${a-2}`,
        "Không tồn tại"
      ],
      ans:0,
      exp:"Hàm liên tục nên thay trực tiếp"
    }
  }

  // 2. Dạng 0/0
  if(type===1){
    let a = rand(1,5);
    return {
      q:`\\(\\lim_{x \\to ${a}} \\frac{x-${a}}{x-${a}}\\)`,
      ops:["1","0","Không tồn tại","∞"],
      ans:0,
      exp:"Rút gọn = 1 (x ≠ a)"
    }
  }

  // 3. Vô cực
  if(type===2){
    return {
      q:`\\(\\lim_{x \\to +\\infty} \\frac{1}{x}\\)`,
      ops:["0","1","∞","-∞"],
      ans:0,
      exp:"Mẫu tăng vô hạn ⇒ giới hạn = 0"
    }
  }

  // 4. Bậc cao nhất
  if(type===3){
    return {
      q:`\\(\\lim_{x \\to +\\infty} \\frac{2x^2 + 1}{x^2}\\)`,
      ops:["2","1","0","∞"],
      ans:0,
      exp:"Chia cho x² ⇒ còn 2"
    }
  }

  // 5. Căn
  if(type===4){
    return {
      q:`\\(\\lim_{x \\to 0} \\frac{\\sqrt{1+x}-1}{x}\\)`,
      ops:["1/2","1","0","2"],
      ans:0,
      exp:"Nhân liên hợp"
    }
  }

  // 6. Lượng giác
  if(type===5){
    return {
      q:`\\(\\lim_{x \\to 0} \\frac{\\sin x}{x}\\)`,
      ops:["1","0","∞","-1"],
      ans:0,
      exp:"Giới hạn đặc biệt"
    }
  }

  // 7. Không tồn tại
  if(type===6){
    return {
      q:`\\(\\lim_{x \\to 0} \\frac{1}{x}\\)`,
      ops:["Không tồn tại","0","1","∞"],
      ans:0,
      exp:"Tiến từ 2 phía khác nhau"
    }
  }

  // 8. Hàm đa thức
  return {
    q:`\\(\\lim_{x \\to 2} (x^2 + 3x)\\)`,
    ops:["10","7","5","∞"],
    ans:0,
    exp:"Thay trực tiếp: 4+6=10"
  }
}

// ================= TẠO 7 ĐỀ =================
const exams=[];

for(let i=0;i<7;i++){
  let exam=[];
  for(let j=1;j<=50;j++){
    exam.push(generateQuestion(i*50+j));
  }
  exams.push(exam);
}

// ================= UI =================
const tabs=document.getElementById("tabs");
const quiz=document.getElementById("quiz");
let score=0;
let currentExam=0;

// tạo tab
exams.forEach((e,i)=>{
  const t=document.createElement("div");
  t.className="tab";
  t.innerText="Đề "+(i+1);
  t.onclick=()=>loadExam(i);
  tabs.appendChild(t);
});

function loadExam(i){
  currentExam=i;
  quiz.innerHTML="";
  score=0;
  document.getElementById("score").innerText=0;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  tabs.children[i].classList.add("active");

  exams[i].forEach((q,idx)=>{

    const div=document.createElement("div");
    div.className="question";

    let html=`<b>Câu ${idx+1}. ${q.q}</b>`;

    q.ops.forEach((op,j)=>{
      html+=`<div class="option" onclick="check(this,${idx},${j})">
      ${String.fromCharCode(65+j)}. ${op}
      </div>`;
    });

    html+=`<div class="explanation">${q.exp}</div>`;

    div.innerHTML=html;
    quiz.appendChild(div);
  });

  MathJax.typeset();
}

// check đáp án
function check(el,qIndex,selected){

  const q=exams[currentExam][qIndex];
  const parent=el.parentElement;
  const ops=parent.querySelectorAll(".option");

  ops.forEach((o,i)=>{
    if(i===q.ans)o.classList.add("correct");
    if(i===selected && i!==q.ans)o.classList.add("wrong");
    o.onclick=null;
  });

  if(selected===q.ans){
    score++;
    document.getElementById("score").innerText=score;
  }

  parent.querySelector(".explanation").style.display="block";
  MathJax.typeset();
}

// load đề 1
loadExam(0);

</script>

</body>
</html>
