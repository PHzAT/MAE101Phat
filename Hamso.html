<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đề Thi Trắc Nghiệm Hàm Số</title>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)']],
        displayMath: [['\\[', '\\]']]
      }
    };
  </script>

  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 20px;
    }

    .container{
      max-width: 1000px;
      margin: auto;
    }

    h1{
      text-align: center;
      color: #1e3a8a;
      margin-bottom: 30px;
    }

    .question{
      background: white;
      padding: 20px;
      margin-bottom: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .question h3{
      color: #111827;
    }

    .option{
      border: 2px solid #d1d5db;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
      background: #fff;
    }

    .option:hover{
      background: #eef2ff;
    }

    .correct{
      background: #bbf7d0 !important;
      border-color: #16a34a !important;
      color: #166534;
    }

    .wrong{
      background: #fecaca !important;
      border-color: #dc2626 !important;
      color: #991b1b;
    }

    .explanation{
      margin-top: 15px;
      padding: 15px;
      background: #f3f4f6;
      border-left: 5px solid #2563eb;
      border-radius: 8px;
      display: none;
    }

    .score-box{
      background: #1e3a8a;
      color: white;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      font-size: 22px;
      margin-bottom: 25px;
    }

    .finish-btn{
      display: block;
      margin: 30px auto;
      padding: 15px 30px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }

    .finish-btn:hover{
      background: #1d4ed8;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>ĐỀ THI TRẮC NGHIỆM HÀM SỐ</h1>

  <div class="score-box">
    Điểm hiện tại: <span id="score">0</span> / 15
  </div>

  <div id="quiz"></div>

  <button class="finish-btn" onclick="finishQuiz()">
    Nộp bài
  </button>

</div>

<script>

const questions = [

{
  question: "1. Miền xác định của hàm số \\(f(x)=\\dfrac{1}{x-2}\\) là:",
  options: [
    "\\(\\mathbb{R}\\)",
    "\\(\\mathbb{R} \\setminus \\{2\\}\\)",
    "\\(x>2\\)",
    "\\(x<2\\)"
  ],
  answer: 1,
  explanation: "Mẫu số phải khác 0 nên \\(x-2 \\neq 0 \\Rightarrow x \\neq 2\\)."
},

{
  question: "2. Miền xác định của hàm số \\(f(x)=\\sqrt{x-3}\\) là:",
  options: [
    "\\(x \\ge 3\\)",
    "\\(x > 3\\)",
    "\\(x \\le 3\\)",
    "\\(\\mathbb{R}\\)"
  ],
  answer: 0,
  explanation: "Biểu thức dưới căn phải không âm: \\(x-3 \\ge 0\\Rightarrow x\\ge3\\)."
},

{
  question: "3. Miền giá trị của hàm số \\(y=x^2\\) là:",
  options: [
    "\\(( -\\infty ; +\\infty )\\)",
    "\\([0;+\\infty)\\)",
    "\\((0;+\\infty)\\)",
    "\\(( -\\infty ;0]\\)"
  ],
  answer: 1,
  explanation: "Vì \\(x^2 \\ge 0\\) với mọi \\(x\\in\\mathbb{R}\\)."
},

{
  question: "4. Hàm số nào sau đây là hàm chẵn?",
  options: [
    "\\(f(x)=x^3\\)",
    "\\(f(x)=x^2\\)",
    "\\(f(x)=x+1\\)",
    "\\(f(x)=\\sin x\\)"
  ],
  answer: 1,
  explanation: "Ta có \\(f(-x)=(-x)^2=x^2=f(x)\\)."
},

{
  question: "5. Hàm số nào sau đây là hàm lẻ?",
  options: [
    "\\(f(x)=x^2\\)",
    "\\(f(x)=|x|\\)",
    "\\(f(x)=x^3\\)",
    "\\(f(x)=x^2+1\\)"
  ],
  answer: 2,
  explanation: "Ta có \\(f(-x)=(-x)^3=-x^3=-f(x)\\)."
},

{
  question: "6. Miền xác định của hàm số \\(f(x)=\\dfrac{1}{\\sqrt{x-1}}\\) là:",
  options: [
    "\\(x>1\\)",
    "\\(x\\ge1\\)",
    "\\(x<1\\)",
    "\\(\\mathbb{R}\\)"
  ],
  answer: 0,
  explanation: "Biểu thức dưới căn phải dương vì ở mẫu: \\(x-1>0\\Rightarrow x>1\\)."
},

{
  question: "7. Hàm số \\(f(x)=2x+5\\) có miền giá trị là:",
  options: [
    "\\([0;+\\infty)\\)",
    "\\(( -\\infty ;5]\\)",
    "\\(\\mathbb{R}\\)",
    "\\((0;5)\\)"
  ],
  answer: 2,
  explanation: "Hàm bậc nhất nhận mọi giá trị thực."
},

{
  question: "8. Đường thẳng song song trục Oy có phải đồ thị hàm số không?",
  options: [
    "Có",
    "Không",
    "Chỉ khi đi qua gốc tọa độ",
    "Chỉ khi có hệ số góc dương"
  ],
  answer: 1,
  explanation: "Một giá trị x ứng với nhiều giá trị y nên không phải hàm số."
},

{
  question: "9. Đồ thị của hàm số phải thỏa điều kiện:",
  options: [
    "Một x ứng với nhiều y",
    "Một y ứng với nhiều x",
    "Mỗi x chỉ ứng với một y",
    "Không có điều kiện"
  ],
  answer: 2,
  explanation: "Định nghĩa hàm số: mỗi giá trị x chỉ có duy nhất một giá trị y."
},

{
  question: "10. Miền xác định của \\(f(x)=\\sqrt{4-x}\\) là:",
  options: [
    "\\(x\\le4\\)",
    "\\(x<4\\)",
    "\\(x\\ge4\\)",
    "\\(\\mathbb{R}\\)"
  ],
  answer: 0,
  explanation: "Điều kiện: \\(4-x\\ge0\\Rightarrow x\\le4\\)."
},

{
  question: "11. Hàm số \\(f(x)=|x|\\) là:",
  options: [
    "Hàm lẻ",
    "Hàm chẵn",
    "Không chẵn không lẻ",
    "Vừa chẵn vừa lẻ"
  ],
  answer: 1,
  explanation: "\\(|-x|=|x|\\) nên hàm chẵn."
},

{
  question: "12. Hàm số \\(f(x)=x^3+x\\) là:",
  options: [
    "Hàm chẵn",
    "Hàm lẻ",
    "Không chẵn không lẻ",
    "Hàm hằng"
  ],
  answer: 1,
  explanation: "\\(f(-x)=-x^3-x=-(x^3+x)=-f(x)\\)."
},

{
  question: "13. Miền giá trị của \\(y=-x^2\\) là:",
  options: [
    "\\(( -\\infty ; +\\infty )\\)",
    "\\([0;+\\infty)\\)",
    "\\(( -\\infty ;0]\\)",
    "\\((0;+\\infty)\\)"
  ],
  answer: 2,
  explanation: "Vì \\(-x^2\\le0\\) với mọi x."
},

{
  question: "14. Đường tròn có phải là đồ thị hàm số không?",
  options: [
    "Có",
    "Không",
    "Chỉ nửa đường tròn trên",
    "Chỉ nửa đường tròn dưới"
  ],
  answer: 1,
  explanation: "Một giá trị x có thể ứng với hai giá trị y."
},

{
  question: "15. Miền xác định của hàm số \\(f(x)=\\dfrac{1}{x^2-9}\\) là:",
  options: [
    "\\(\\mathbb{R}\\setminus\\{-3;3\\}\\)",
    "\\(\\mathbb{R}\\)",
    "\\(x>3\\)",
    "\\(x\\neq3\\)"
  ],
  answer: 0,
  explanation: "Mẫu số khác 0: \\(x^2-9\\neq0\\Rightarrow x\\neq\\pm3\\)."
}

];

const quiz = document.getElementById("quiz");
let score = 0;
let answered = Array(questions.length).fill(false);

questions.forEach((q, index) => {

  const div = document.createElement("div");
  div.className = "question";

  let html = `
    <h3>${q.question}</h3>
  `;

  q.options.forEach((opt, i) => {
    html += `
      <div class="option"
           onclick="checkAnswer(this, ${index}, ${i})">
           ${String.fromCharCode(65+i)}. ${opt}
      </div>
    `;
  });

  html += `
    <div class="explanation" id="exp-${index}">
      <strong>Giải thích:</strong> ${q.explanation}
    </div>
  `;

  div.innerHTML = html;
  quiz.appendChild(div);

});

function checkAnswer(element, qIndex, selected){

  if(answered[qIndex]) return;

  answered[qIndex] = true;

  const questionDiv =
    element.parentElement;

  const options =
    questionDiv.querySelectorAll(".option");

  const correctAnswer =
    questions[qIndex].answer;

  options.forEach((opt, i)=>{

    if(i === correctAnswer){
      opt.classList.add("correct");
    }

    if(i === selected && selected !== correctAnswer){
      opt.classList.add("wrong");
    }

  });

  if(selected === correctAnswer){
    score++;
    document.getElementById("score").innerText = score;
  }

  document.getElementById(`exp-${qIndex}`).style.display = "block";

  MathJax.typeset();
}

function finishQuiz(){

  alert(
    `Bạn đã hoàn thành bài thi!\nĐiểm số: ${score}/15`
  );

}

</script>

</body>
</html>
